<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - HostelIMS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="register-body">
<div class="register-container">
  <div class="register-header">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i></a>
    <div class="brand-icon-sm"><i class="fas fa-building"></i></div>
    <span class="brand-name-sm">HostelIMS</span>
  </div>
  <h2>Student Registration</h2>
  <p class="register-sub">Fill in the details to register for hostel accommodation.</p>

  <div class="form-section">
    <h3>Personal Information</h3>
    <div class="form-grid-2">
      <div class="form-group"><label>Full Name *</label><input type="text" id="reg_name" placeholder="Your full name"/></div>
      <div class="form-group"><label>Roll Number *</label><input type="text" id="reg_roll" placeholder="e.g. S001"/></div>
      <div class="form-group"><label>Email *</label><input type="email" id="reg_email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Phone *</label><input type="text" id="reg_phone" placeholder="10-digit number"/></div>
    </div>
    <div class="form-group"><label>Address *</label><input type="text" id="reg_address" placeholder="Your address"/></div>
  </div>

  <div class="form-section">
    <h3>Academic Details</h3>
    <div class="form-grid-2">
      <div class="form-group"><label>Course *</label><input type="text" id="reg_course" placeholder="e.g. B.Tech Computer Science"/></div>
      <div class="form-group"><label>Year *</label>
        <select id="reg_year">
          <option>Year 1</option><option>Year 2</option><option>Year 3</option><option>Year 4</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-section">
    <h3>Guardian Information</h3>
    <div class="form-grid-2">
      <div class="form-group"><label>Guardian Name *</label><input type="text" id="reg_gname" placeholder="Guardian's name"/></div>
      <div class="form-group"><label>Guardian Phone *</label><input type="text" id="reg_gphone" placeholder="Guardian's phone"/></div>
    </div>
  </div>

  <div class="form-section">
    <h3>Account Setup</h3>
    <div class="form-group">
      <label>Password *</label>
      <div class="input-eye">
        <input type="password" id="reg_pass" placeholder="Create a password"/>
        <i class="fas fa-eye" onclick="togglePass()"></i>
      </div>
      <small>You'll use your roll number and this password to log in.</small>
    </div>
  </div>

  <div id="regError" class="error-msg" style="display:none"></div>
  <div id="regSuccess" class="success-msg" style="display:none"></div>
  <button class="btn-primary full-width" onclick="handleRegister()">Register</button>
</div>

<script>
function togglePass() {
  const el = document.getElementById('reg_pass');
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function handleRegister() {
  const errEl = document.getElementById('regError');
  const sucEl = document.getElementById('regSuccess');
  errEl.style.display = 'none'; sucEl.style.display = 'none';

  const data = {
    name: document.getElementById('reg_name').value.trim(),
    roll_number: document.getElementById('reg_roll').value.trim(),
    email: document.getElementById('reg_email').value.trim(),
    phone: document.getElementById('reg_phone').value.trim(),
    address: document.getElementById('reg_address').value.trim(),
    course: document.getElementById('reg_course').value.trim(),
    year: document.getElementById('reg_year').value,
    guardian_name: document.getElementById('reg_gname').value.trim(),
    guardian_phone: document.getElementById('reg_gphone').value.trim(),
    password: document.getElementById('reg_pass').value,
  };

  if (!data.name || !data.roll_number || !data.email || !data.phone || !data.address || !data.course || !data.password) {
    errEl.textContent = 'Please fill in all required fields'; errEl.style.display = 'block'; return;
  }

  try {
    const res = await fetch('/api/auth/student/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const result = await res.json();
    if (!res.ok) { errEl.textContent = result.error; errEl.style.display = 'block'; return; }
    sucEl.textContent = result.message + ' Redirecting to login...';
    sucEl.style.display = 'block';
    setTimeout(() => window.location.href = '../index.html', 2000);
  } catch (e) {
    errEl.textContent = 'Server error.'; errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
