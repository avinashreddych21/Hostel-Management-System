<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Mess Menu - HostelIMS Admin</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.mess-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: white; }
.day-col { border-right: 1px solid var(--border); }
.day-col:last-child { border-right: none; }
.day-header { background: var(--primary); color: white; text-align: center; padding: 12px 6px; font-weight: 700; font-size: 13px; }
.day-header.today { background: var(--accent); }
.meal-cell { border-top: 1px solid var(--border); padding: 10px; min-height: 110px; position: relative; cursor: pointer; transition: background 0.15s; }
.meal-cell:hover { background: #f8fafc; }
.meal-cell:hover .edit-icon { opacity: 1; }
.meal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
.meal-items { font-size: 12px; color: var(--text); line-height: 1.5; }
.meal-timing { font-size: 10px; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 3px; }
.edit-icon { opacity: 0; color: var(--accent); font-size: 11px; transition: opacity 0.15s; }
.meal-breakfast .meal-label { color: #d97706; }
.meal-lunch .meal-label { color: #16a34a; }
.meal-snacks .meal-label { color: #7c3aed; }
.meal-dinner .meal-label { color: #1d4ed8; }
.meal-breakfast { background: #fffbeb; }
.meal-lunch { background: #f0fdf4; }
.meal-snacks { background: #faf5ff; }
.meal-dinner { background: #eff6ff; }
.legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }
.today-badge { background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
/* mobile scroll */
.mess-wrapper { overflow-x: auto; }
</style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Mess Menu</h1>
        <p style="color:var(--text-muted);font-size:13px;margin-top:2px">Click any meal cell to edit its items and timing</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="lastUpdated" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> Breakfast</div>
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> Lunch</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> Snacks</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1d4ed8"></div> Dinner</div>
    </div>

    <div class="mess-wrapper">
      <div class="mess-grid" id="messGrid">
        <div style="padding:40px;text-align:center;color:var(--text-muted);grid-column:1/-1">Loading menu...</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
requireAdmin();
document.getElementById('sidebar').innerHTML = buildAdminSidebar('Mess Menu');

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MEALS = ['Breakfast','Lunch','Snacks','Dinner'];
const MEAL_ICONS = { Breakfast: 'fa-mug-hot', Lunch: 'fa-bowl-food', Snacks: 'fa-cookie-bite', Dinner: 'fa-moon' };
let menuData = {};

function getTodayName() {
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
}

async function loadMenu() {
  menuData = await API.get('/mess') || {};
  renderMenu();
}

function renderMenu() {
  const today = getTodayName();
  let html = '';
  DAYS.forEach(day => {
    const isToday = day === today;
    html += `<div class="day-col">
      <div class="day-header ${isToday ? 'today' : ''}">${day.slice(0,3).toUpperCase()}${isToday ? '<br><span style="font-size:10px;opacity:0.85">Today</span>' : ''}</div>`;
    MEALS.forEach(meal => {
      const m = menuData[day]?.[meal] || {};
      html += `<div class="meal-cell meal-${meal.toLowerCase()}" onclick="editMeal('${day}','${meal}')">
        <div class="meal-label">
          <span><i class="fas ${MEAL_ICONS[meal]}" style="margin-right:3px"></i>${meal}</span>
          <i class="fas fa-pen edit-icon"></i>
        </div>
        <div class="meal-items">${m.items || '<span style="color:var(--text-muted);font-style:italic">Not set</span>'}</div>
        ${m.timing ? `<div class="meal-timing"><i class="fas fa-clock"></i>${m.timing}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('messGrid').innerHTML = html;
}

function editMeal(day, meal) {
  const m = menuData[day]?.[meal] || {};
  const html = `
    <h3>Edit ${day} - ${meal} <span class="modal-close" onclick="closeModal()">✕</span></h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span class="badge badge-blue"><i class="fas ${MEAL_ICONS[meal]}" style="margin-right:4px"></i>${meal}</span>
      <span class="badge badge-gray">${day}</span>
    </div>
    <div class="form-group">
      <label>Menu Items *</label>
      <textarea id="em_items" rows="4" placeholder="e.g. Idli, Sambar, Coconut Chutney, Tea/Coffee">${m.items||''}</textarea>
      <small style="color:var(--text-muted)">Separate items with commas</small>
    </div>
    <div class="form-group">
      <label>Timing</label>
      <input id="em_timing" value="${m.timing||''}" placeholder="e.g. 7:00 AM - 9:00 AM"/>
    </div>
    <div class="modal-actions">
      <button class="btn-edit" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveMeal('${day}','${meal}')">Save Changes</button>
    </div>`;
  showModal(html);
}

async function saveMeal(day, meal) {
  const items = document.getElementById('em_items').value.trim();
  const timing = document.getElementById('em_timing').value.trim();
  if (!items) { toast('Please enter menu items', 'error'); return; }
  const result = await API.post('/mess/update', { day_name: day, meal_type: meal, items, timing });
  if (result.ok) {
    if (!menuData[day]) menuData[day] = {};
    menuData[day][meal] = { items, timing };
    toast(`${day} ${meal} updated!`);
    closeModal();
    renderMenu();
  } else toast(result.data.error || 'Failed', 'error');
}

loadMenu();
</script>
</body>
</html>
